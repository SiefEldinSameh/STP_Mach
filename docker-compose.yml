services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/ckpts:/app/backend/ckpts:ro
      - ./backend/uploads:/app/backend/uploads
      - ./backend/outputs:/app/backend/outputs

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: http://localhost:8000/api
    depends_on:
      - backend
    ports:
      - "4173:4173"
